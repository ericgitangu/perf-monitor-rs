# LXC container configuration for monitor-rs
# Place in /var/lib/lxc/monitor-rs/config

# Container settings
lxc.include = /usr/share/lxc/config/common.conf
lxc.arch = linux64

# Container identification
lxc.uts.name = monitor-rs
lxc.tty.max = 4

# Networking
lxc.net.0.type = veth
lxc.net.0.link = lxcbr0
lxc.net.0.flags = up
lxc.net.0.hwaddr = 00:16:3e:xx:xx:xx

# Filesystem
lxc.rootfs.path = dir:/var/lib/lxc/monitor-rs/rootfs
lxc.rootfs.backend = dir

# Resource limits
lxc.cgroup2.cpu.max = 100000 100000  # 1 CPU core
lxc.cgroup2.memory.max = 256M
lxc.cgroup2.memory.swap.max = 256M

# Mount host /proc for system metrics
lxc.mount.entry = /proc proc proc ro,bind 0 0
lxc.mount.entry = /sys sys sysfs ro,bind 0 0

# Auto start
lxc.start.auto = 1
lxc.start.delay = 5
lxc.start.order = 100

# Security
lxc.apparmor.profile = unconfined
lxc.cap.drop = sys_module mac_admin mac_override

# For accurate system metrics, grant some capabilities
lxc.cap.keep = sys_ptrace sys_admin
