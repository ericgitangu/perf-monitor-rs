{{- if .Values.serviceAccount.create -}}
apiVersion: {{ include "monitor-rs.rbac.apiVersion" . }}
kind: ClusterRoleBinding
metadata:
  name: {{ include "monitor-rs.fullname" . }}
  labels:
    {{- include "monitor-rs.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "monitor-rs.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "monitor-rs.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
