# Default values for monitor-rs Helm chart

# Image configuration
image:
  repository: monitor-rs
  pullPolicy: IfNotPresent
  tag: "0.1.0"

# Image pull secrets for private registries
imagePullSecrets: []

# Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Node selector for pod assignment
nodeSelector: {}

# Tolerations for pod assignment
tolerations:
  - effect: NoSchedule
    operator: Exists

# Affinity rules
affinity: {}

# Prometheus monitoring
prometheus:
  enabled: true
  port: 9100
  path: /metrics
  interval: 15s

# ServiceMonitor for Prometheus Operator
serviceMonitor:
  enabled: true
  namespace: ""
  labels: {}
  interval: 15s
  scrapeTimeout: 10s

# Monitor-RS configuration
config:
  general:
    update_interval: "1s"
    log_level: "info"

  export:
    enabled: true
    port: 9100

  ui:
    theme: "default"
    refresh_rate: 1000

  # Database services to monitor
  services:
    mysql:
      enabled: false
      instances: []
      # Example:
      # - name: "main"
      #   host: "mysql.default.svc.cluster.local"
      #   port: 3306
      #   username: "monitor"
      #   password: "secret"

    postgresql:
      enabled: false
      instances: []
      # Example:
      # - name: "accounts"
      #   host: "postgres.default.svc.cluster.local"
      #   port: 5432
      #   username: "monitor"
      #   password: "secret"
      #   database: "postgres"

    redis:
      enabled: false
      instances: []
      # Example:
      # - name: "cache"
      #   host: "redis.default.svc.cluster.local"
      #   port: 6379

    sidekiq:
      enabled: false
      redis_url: ""
      namespace: "sidekiq"
      queues: []

    rabbitmq:
      enabled: false
      management_url: ""
      username: "guest"
      password: "guest"
      queues: []

    celery:
      enabled: false
      broker_url: ""
      broker_type: "redis"
      queues: []

# Host path mounts for system metrics
hostPath:
  procfs: /proc
  sysfs: /sys

# Update strategy for DaemonSet
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# Priority class name
priorityClassName: ""

# Extra labels for all resources
labels: {}

# Extra annotations for pods
podAnnotations: {}

# Host network mode (required for accurate system metrics)
hostNetwork: true
hostPID: true

# DNS policy
dnsPolicy: ClusterFirstWithHostNet
