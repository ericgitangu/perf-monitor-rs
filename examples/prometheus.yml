# Prometheus scrape configuration example for monitor-rs
#
# Place this in your Prometheus configuration file or include it
# in the scrape_configs section

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'monitor-rs'

scrape_configs:
  # Monitor-RS metrics export
  - job_name: 'monitor-rs'
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: '/metrics'
    scheme: 'http'

    # Static targets
    static_configs:
      - targets:
          - 'localhost:9100'
        labels:
          instance: 'localhost'
          environment: 'production'

  # Health check endpoint
  - job_name: 'monitor-rs-health'
    scrape_interval: 30s
    metrics_path: '/health'
    scheme: 'http'

    static_configs:
      - targets:
          - 'localhost:9100'

  # Kubernetes service discovery (if running in K8s)
  - job_name: 'monitor-rs-k8s'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - monitoring

    relabel_configs:
      # Only scrape pods with the monitor-rs label
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: monitor-rs

      # Use pod name as instance label
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: instance

      # Add namespace label
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

      # Use pod IP for scraping
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: '${1}:9100'

