# Prometheus configuration for monitor-rs with Docker Compose
# This configuration scrapes monitor-rs running on the host machine

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'monitor-rs'
    cluster: 'dev'

# Alerting configuration (optional - uncomment to use)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - 'alertmanager:9093'

# Load alert rules (optional - uncomment to use)
# rule_files:
#   - 'monitor-rs-alerts.yml'

scrape_configs:
  # Monitor-RS metrics export from host machine
  - job_name: 'monitor-rs'
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: '/metrics'
    scheme: 'http'

    static_configs:
      - targets:
          # For Docker Desktop (Mac/Windows) use:
          - 'host.docker.internal:9100'
          # For Linux, uncomment this line and comment the above:
          # - '172.17.0.1:9100'
        labels:
          instance: 'localhost'
          environment: 'dev'
          job_type: 'system'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          instance: 'prometheus'
